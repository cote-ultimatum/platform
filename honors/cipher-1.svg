<?xml version="1.0" encoding="UTF-8"?>
<!-- Cipher — Limited category. Three dots in a triangular sigil cluster.
     Violet color identity (no ring). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cipherGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="symbolShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.55"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="symbolGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.85"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#symbolShadow)">
    <g filter="url(#symbolGlow)" fill="url(#cipherGrad)">
      <circle cx="32" cy="16" r="7"/>
      <circle cx="18" cy="42" r="7"/>
      <circle cx="46" cy="42" r="7"/>
    </g>
  </g>
</svg>

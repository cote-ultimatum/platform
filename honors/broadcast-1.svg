<?xml version="1.0" encoding="UTF-8"?>
<!-- Broadcast — commendation pin for Broadcasting Club members. Teal ring
     (Discord role gradient: #0b6e6e → #2ec4b6) + stylized microphone. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fieldGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ec4b6"/>
      <stop offset="100%" stop-color="#0b6e6e"/>
    </linearGradient>
    <radialGradient id="topHighlight" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ringClip">
      <path d="M32 2 A30 30 0 1 1 31.99 2 Z M32 8 A24 24 0 1 0 32.01 8 Z" fill-rule="evenodd"/>
    </clipPath>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="0.8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="symbolMetalGrad" x1="0" y1="13" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ec4b6"/>
      <stop offset="100%" stop-color="#0b6e6e"/>
    </linearGradient>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#2ec4b6" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pinShadow)">
    <circle cx="32" cy="32" r="24" fill="url(#fieldGrad)"/>
    <circle cx="32" cy="32" r="27" fill="none" stroke="url(#metalGrad)" stroke-width="6" filter="url(#ringGlow)"/>
    <g clip-path="url(#ringClip)">
      <rect width="64" height="64" fill="url(#topHighlight)"/>
    </g>
    <!-- Microphone: filled capsule + stroked U-stand + stem + base -->
    <g fill="url(#symbolMetalGrad)" stroke="url(#symbolMetalGrad)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="25" y="14" width="14" height="20" rx="7"/>
      <path d="M 20 28 C 20 42 44 42 44 28" fill="none"/>
      <line x1="32" y1="42" x2="32" y2="48"/>
      <line x1="26" y1="50" x2="38" y2="50"/>
    </g>
  </g>
</svg>

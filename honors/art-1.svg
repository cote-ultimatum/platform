<?xml version="1.0" encoding="UTF-8"?>
<!-- Art — commendation pin for Art Club members. Cream-to-burnt-orange ring
     (Discord role gradient: #ffe5b4 → #c2410c) + painter's palette. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fieldGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe5b4"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="topHighlight" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ringClip">
      <path d="M32 2 A30 30 0 1 1 31.99 2 Z M32 8 A24 24 0 1 0 32.01 8 Z" fill-rule="evenodd"/>
    </clipPath>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="0.8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="symbolMetalGrad" x1="0" y1="20" x2="0" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe5b4"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#fdba74" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pinShadow)">
    <circle cx="32" cy="32" r="24" fill="url(#fieldGrad)"/>
    <circle cx="32" cy="32" r="27" fill="none" stroke="url(#metalGrad)" stroke-width="6" filter="url(#ringGlow)"/>
    <g clip-path="url(#ringClip)">
      <rect width="64" height="64" fill="url(#topHighlight)"/>
    </g>
    <!-- Palette body with thumb hole (evenodd cuts out the inner subpath) -->
    <path fill="url(#symbolMetalGrad)" fill-rule="evenodd" d="
      M 14 32 a 18 11 0 1 0 36 0 a 18 11 0 1 0 -36 0 Z
      M 39 26 a 3 2.2 0 1 0 6 0 a 3 2.2 0 1 0 -6 0 Z
    "/>
    <!-- Paint wells (dark dots reading as color reservoirs on the palette) -->
    <g fill="url(#fieldGrad)">
      <circle cx="22" cy="34" r="1.8"/>
      <circle cx="28" cy="36.5" r="1.8"/>
      <circle cx="34" cy="35" r="1.8"/>
    </g>
  </g>
</svg>

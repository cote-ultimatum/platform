<?xml version="1.0" encoding="UTF-8"?>
<!-- Diplomat I — Bronze tier of the Diplomat commendation, Social category. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6db17e"/>
      <stop offset="100%" stop-color="#3a6e49"/>
    </linearGradient>
    <radialGradient id="fieldGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="0.8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="topHighlight" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ringClip">
      <path d="M32 2 A30 30 0 1 1 31.99 2 Z M32 8 A24 24 0 1 0 32.01 8 Z" fill-rule="evenodd"/>
    </clipPath>
    <linearGradient id="metalGrad" x1="0" y1="20" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8a872"/>
      <stop offset="100%" stop-color="#b87333"/>
    </linearGradient>
    <filter id="symbolGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feFlood flood-color="#e8a872" flood-opacity="0.62"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pinShadow)">
    <circle cx="32" cy="32" r="30" fill="url(#ringGrad)" stroke="#244a30" stroke-width="0.8"/>

    <g clip-path="url(#ringClip)">
      <rect width="64" height="64" fill="url(#topHighlight)"/>
    </g>

    <circle cx="32" cy="32" r="24" fill="url(#fieldGrad)"/>

    <circle cx="32" cy="32" r="25" fill="none" stroke="url(#metalGrad)" stroke-width="2"/>

    <circle cx="32" cy="32" r="26.5" fill="none" stroke="#1a3a25" stroke-width="0.6" stroke-opacity="0.85"/>

    <g filter="url(#symbolGlow)" fill="none" stroke="url(#metalGrad)" stroke-width="2.6" stroke-linecap="round">
      <circle cx="25" cy="32" r="9"/>
      <circle cx="39" cy="32" r="9"/>
      <path d="M 32.95 36.22 A 9 9 0 0 1 29.77 39.63"/>
    </g>
  </g>
</svg>

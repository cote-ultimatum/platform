<?xml version="1.0" encoding="UTF-8"?>
<!-- Diplomat IV — Diamond tier, Social category. Saturated cyan to clearly
     differentiate from silver. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="symbolShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.55"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="symbolGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#67e8f9" flood-opacity="0.85"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#symbolShadow)">
    <g filter="url(#symbolGlow)" fill="none" stroke="url(#metalGrad)" stroke-width="4" stroke-linecap="round">
      <circle cx="22" cy="32" r="13"/>
      <circle cx="42" cy="32" r="13"/>
      <path d="M 33.5 38.1 A 13 13 0 0 1 30 42.2"/>
    </g>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!-- Cooking — commendation pin for Cooking Club members. Cotton-candy to rose
     ring (Discord role gradient: #fbcfe8 → #db2777) + chef's-knife silhouette
     modeled on the 🔪 emoji: light bladed body, dark riveted handle. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fieldGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="topHighlight" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ringClip">
      <path d="M32 2 A30 30 0 1 1 31.99 2 Z M32 8 A24 24 0 1 0 32.01 8 Z" fill-rule="evenodd"/>
    </clipPath>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="0.8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="symbolMetalGrad" x1="0" y1="20" x2="0" y2="44" gradientUnits="userSpaceOnUse" gradientTransform="rotate(-40 32 32)">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#f9a8d4" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pinShadow)">
    <circle cx="32" cy="32" r="24" fill="url(#fieldGrad)"/>
    <circle cx="32" cy="32" r="27" fill="none" stroke="url(#metalGrad)" stroke-width="6" filter="url(#ringGlow)"/>
    <g clip-path="url(#ringClip)">
      <rect width="64" height="64" fill="url(#topHighlight)"/>
    </g>
    <!-- Knife drawn horizontally then rotated 40° and mirrored across x so the
         tip rides upper-right and the cutting edge with belly faces the right
         side of the pin. Tip at (11,32), butt at (53,32) — both r=21 from
         center, symmetric. Blade:handle ≈ 60:40. Gradient rotates -40° (see
         symbolMetalGrad above) so the spine highlight follows the new
         orientation. -->
    <g transform="translate(64 0) scale(-1 1) rotate(40 32 32)">
      <!-- Blade: gently sloped spine, deep belly on cutting edge -->
      <path d="M 11 32 L 36 27 L 36 37 Q 22 43, 11 32 Z" fill="url(#symbolMetalGrad)"/>
      <!-- Bolster: thin metallic collar separating blade and handle -->
      <rect x="35.5" y="26.5" width="2.5" height="11" rx="0.5" fill="url(#symbolMetalGrad)"/>
      <!-- Handle: solid dark, like the emoji -->
      <rect x="38" y="28" width="15" height="8" rx="2.5" fill="#1a1d24"/>
      <!-- Rivets: light pin heads on the dark handle -->
      <circle cx="42.5" cy="32" r="1" fill="url(#symbolMetalGrad)"/>
      <circle cx="48.5" cy="32" r="1" fill="url(#symbolMetalGrad)"/>
    </g>
  </g>
</svg>

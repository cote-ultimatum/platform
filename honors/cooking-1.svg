<?xml version="1.0" encoding="UTF-8"?>
<!-- Cooking — commendation pin for Cooking Club members. Rose to cotton-candy
     ring (Discord role gradient: #db2777 → #fbcfe8) + stylized kitchen knife. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="fieldGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#050608"/>
    </radialGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <radialGradient id="topHighlight" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ringClip">
      <path d="M32 2 A30 30 0 1 1 31.99 2 Z M32 8 A24 24 0 1 0 32.01 8 Z" fill-rule="evenodd"/>
    </clipPath>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="0.8" result="offsetBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.45"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="symbolMetalGrad" x1="0" y1="14" x2="0" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#f9a8d4" flood-opacity="0.7"/>
      <feComposite in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#pinShadow)">
    <circle cx="32" cy="32" r="24" fill="url(#fieldGrad)"/>
    <circle cx="32" cy="32" r="27" fill="none" stroke="url(#metalGrad)" stroke-width="6" filter="url(#ringGlow)"/>
    <g clip-path="url(#ringClip)">
      <rect width="64" height="64" fill="url(#topHighlight)"/>
    </g>
    <!-- Kitchen knife: blade tip upper-right, handle lower-left -->
    <g fill="url(#symbolMetalGrad)" transform="rotate(-45 32 32)">
      <!-- Blade: spine straight along top, cutting edge curves with belly -->
      <path d="M 56 26 L 34 22 L 34 32 Q 46 33.5, 56 26 Z"/>
      <!-- Bolster: collar between blade and handle -->
      <rect x="30.5" y="21.5" width="3" height="11" rx="0.6"/>
      <!-- Handle -->
      <rect x="9" y="23" width="21.5" height="8" rx="2.2"/>
    </g>
  </g>
</svg>
